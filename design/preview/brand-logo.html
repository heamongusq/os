<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Logo + mark</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .grid { display: grid; grid-template-columns: auto auto auto 1fr; gap: 36px; align-items: center; }
  .panel { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .panel .nm { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
  .word {
    font-family: var(--font-serif);
    font-size: 56px;
    font-style: italic;
    font-weight: 420;
    font-variation-settings: "opsz" 56;
    color: var(--fg-1);
    letter-spacing: -0.02em;
  }
  .word::after {
    content: "";
    display: inline-block; width: 9px; height: 9px;
    background: var(--violet-500); border-radius: 50%;
    margin-left: 4px; vertical-align: 6px;
  }
  .icon-tile {
    width: 88px; height: 88px;
    background: #0B0E1A; border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    color: #ECEAE3; position: relative; overflow: hidden;
  }
  .icon-tile .bar {
    position: absolute; top: 8px; bottom: 8px;
    left: calc(50% - 2px); width: 4px;
    background: #7C5CFF; opacity: 0.85;
  }
  .icon-tile span {
    font-family: var(--font-serif); font-style: italic; font-size: 44px;
    font-variation-settings: "opsz" 44; position: relative;
  }
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="panel">
      <div class="word">OS</div>
      <span class="nm">wordmark · serif italic + violet dot</span>
    </div>
    <div class="panel">
      <div class="icon-tile"><div class="bar"></div><span>OS</span></div>
      <span class="nm">app icon · ink-navy bg</span>
    </div>
    <div class="panel">
      <div style="width:64px;height:64px;display:flex;align-items:center;justify-content:center">
        <svg viewBox="0 0 64 64" width="56" height="56" fill="none">
          <circle cx="32" cy="32" r="22" stroke="currentColor" stroke-width="3"/>
          <rect x="22" y="22" width="20" height="20" stroke="currentColor" stroke-width="1.5"/>
          <rect x="29.5" y="10" width="5" height="44" fill="#7C5CFF"/>
        </svg>
      </div>
      <span class="nm">mark · O + system bar</span>
    </div>
    <div style="font-family: var(--font-serif); font-style: italic; font-size: 18px; color: var(--fg-2); max-width: 28ch; line-height: 1.45">
      The violet vertical bar is the only recurring graphic motif in the system — it appears in the mark, in the icon, and as the "process indicator" on the currently focused row.
    </div>
  </div>
</div>
</body>
</html>

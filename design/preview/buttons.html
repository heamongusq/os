<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Buttons</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 18px 24px;
    align-items: start;
  }
  .grp { display: flex; flex-direction: column; gap: 10px; align-items: flex-start; }
  .lbl { font-family: var(--font-mono); font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); }

  /* ---- buttons ---- */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 0 14px; height: 32px;
    border-radius: var(--radius-2);
    font-family: var(--font-serif); font-size: 14px; font-weight: 460;
    cursor: pointer; transition: background var(--dur-2) var(--ease), color var(--dur-2) var(--ease);
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .btn svg { width: 14px; height: 14px; stroke-width: 1.5; }

  .btn--primary { background: var(--accent); color: #fff; }
  .btn--primary:hover { background: var(--accent-hover); }
  .btn--primary[data-state="press"] { background: var(--accent-press); }

  .btn--secondary { background: var(--bg-1); color: var(--fg-1); border-color: var(--border-2); }
  .btn--secondary:hover { background: var(--bg-2); }

  .btn--ghost { color: var(--fg-2); }
  .btn--ghost:hover { background: var(--bg-2); color: var(--fg-1); }

  .btn--danger { background: var(--bg-1); color: var(--danger); border-color: var(--border-2); }
  .btn--danger:hover { background: var(--danger-tint); }

  .btn[disabled] { opacity: 0.45; cursor: not-allowed; }

  .btn--sm { height: 26px; font-size: 13px; padding: 0 10px; }
  .btn--lg { height: 40px; font-size: 15px; padding: 0 18px; }

  .icon-btn {
    width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center;
    border-radius: var(--radius-2); color: var(--fg-3);
    transition: background var(--dur-2), color var(--dur-2);
    cursor: pointer;
  }
  .icon-btn:hover { background: var(--bg-2); color: var(--fg-1); }
  .icon-btn svg { width: 16px; height: 16px; stroke-width: 1.5; }

  .focused {
    box-shadow: var(--shadow-focus);
  }
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="grp">
      <span class="lbl">Primary</span>
      <button class="btn btn--primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        Add task
      </button>
      <button class="btn btn--primary focused">Save</button>
    </div>
    <div class="grp">
      <span class="lbl">Secondary</span>
      <button class="btn btn--secondary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
        Schedule
      </button>
      <button class="btn btn--secondary" disabled>Disabled</button>
    </div>
    <div class="grp">
      <span class="lbl">Ghost / icon</span>
      <div class="row" style="gap:4px">
        <button class="btn btn--ghost">Cancel</button>
        <button class="icon-btn" title="Edit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 113 3L7 19l-4 1 1-4z"/></svg>
        </button>
        <button class="icon-btn" title="Delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </div>
    </div>

    <div class="grp">
      <span class="lbl">Destructive</span>
      <button class="btn btn--danger">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
        Delete goal
      </button>
    </div>
    <div class="grp">
      <span class="lbl">Sizes</span>
      <div class="row" style="gap:8px; align-items: center">
        <button class="btn btn--primary btn--sm">Small</button>
        <button class="btn btn--primary">Default</button>
        <button class="btn btn--primary btn--lg">Large</button>
      </div>
    </div>
    <div class="grp">
      <span class="lbl">States</span>
      <div class="row" style="gap:6px">
        <button class="btn btn--primary">Rest</button>
        <button class="btn btn--primary" style="background: var(--accent-hover)">Hover</button>
        <button class="btn btn--primary" style="background: var(--accent-press)">Press</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Checkbox + priority</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
  .grp { display: flex; flex-direction: column; gap: 12px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); }
  .opt { display: flex; align-items: center; gap: 12px; font-family: var(--font-serif); font-size: 15px; }
  .cb {
    width: 18px; height: 18px;
    border: 1.5px solid var(--border-strong);
    border-radius: 3px;
    background: var(--bg-1);
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all var(--dur-2);
  }
  .cb svg { width: 12px; height: 12px; stroke-width: 2; color: #fff; opacity: 0; }
  .cb.checked { background: var(--accent); border-color: var(--accent); }
  .cb.checked svg { opacity: 1; }
  .struck { color: var(--fg-3); text-decoration: line-through; text-decoration-thickness: 1px; }

  /* Priority */
  .prio {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 2px 8px 2px 6px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--border-1);
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--fg-2);
    background: var(--bg-1);
  }
  .prio .bars { display: inline-flex; gap: 2px; align-items: end; }
  .prio .bars i { display: inline-block; width: 2px; background: currentColor; border-radius: 1px; }
  .prio .bars i:nth-child(1) { height: 5px; }
  .prio .bars i:nth-child(2) { height: 8px; }
  .prio .bars i:nth-child(3) { height: 11px; }
  .prio--low      { color: var(--fg-3); }
  .prio--low .bars i:nth-child(2),
  .prio--low .bars i:nth-child(3) { opacity: 0.25; }
  .prio--medium   { color: var(--fg-2); }
  .prio--medium .bars i:nth-child(3) { opacity: 0.25; }
  .prio--high     { color: var(--warning); border-color: var(--warning-tint); background: var(--warning-tint); }
  .prio--highest  { color: var(--danger); border-color: var(--danger-tint); background: var(--danger-tint); }
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="grp">
      <span class="lbl">Checkbox states</span>
      <div class="opt"><span class="cb"></span><span>Empty · rest</span></div>
      <div class="opt"><span class="cb" style="border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-ring)"></span><span>Empty · focused</span></div>
      <div class="opt"><span class="cb checked"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span><span class="struck">Completed</span></div>
    </div>
    <div class="grp">
      <span class="lbl">Priority pills</span>
      <div class="prio prio--low"><span class="bars"><i></i><i></i><i></i></span>Low</div>
      <div class="prio prio--medium"><span class="bars"><i></i><i></i><i></i></span>Medium</div>
      <div class="prio prio--high"><span class="bars"><i></i><i></i><i></i></span>High</div>
      <div class="prio prio--highest"><span class="bars"><i></i><i></i><i></i></span>Highest</div>
    </div>
  </div>
</div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Light + dark surfaces</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .mode {
    border-radius: var(--radius-2);
    border: 1px solid var(--border-1);
    overflow: hidden;
    min-height: 200px;
  }
  .mode .stripe {
    display: flex; height: 40px;
  }
  .mode .stripe span {
    flex: 1; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 11px; font-weight: 600;
    letter-spacing: 0.04em;
    border-right: 1px solid var(--border-1);
  }
  .mode .stripe span:last-child { border-right: 0; }
  .mode .demo { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
  .mode .demo .hd { font-family: var(--font-serif); font-style: italic; font-size: 22px; }
  .mode .demo .ln { display: flex; align-items: center; gap: 10px; font-size: 14px; }
  .mode .demo .bx { width: 14px; height: 14px; border: 1.5px solid currentColor; border-radius: 3px; opacity: .7; }
  .mode .demo .acc {
    color: var(--violet-700);
    font-weight: 500;
  }
  .mode .demo .mt { font-family: var(--font-mono); font-size: 11px; opacity: .55; margin-left: auto; }
  .light { background: #FAFAF7; color: #1C1B18; }
  .light .stripe span:nth-child(1) { background: #FFFFFF; color: #1C1B18; }
  .light .stripe span:nth-child(2) { background: #FAFAF7; color: #1C1B18; }
  .light .stripe span:nth-child(3) { background: #F2F1EC; color: #1C1B18; }
  .light .stripe span:nth-child(4) { background: #E6E4DC; color: #1C1B18; }
  .dark  { background: #0B0E1A; color: #ECEAE3; }
  .dark .stripe span:nth-child(1) { background: #0B0E1A; color: #ECEAE3; }
  .dark .stripe span:nth-child(2) { background: #131726; color: #ECEAE3; }
  .dark .stripe span:nth-child(3) { background: #1B2034; color: #ECEAE3; }
  .dark .stripe span:nth-child(4) { background: #161A2A; color: #ECEAE3; }
  .dark .demo .acc { color: #C8B4FF; font-weight: 500; }
</style>
</head>
<body>
<div class="card">
  <div class="mode-grid">
    <div class="mode light">
      <div class="stripe">
        <span>bg‑0</span><span>bg‑1</span><span>bg‑2</span><span>bg‑3</span>
      </div>
      <div class="demo">
        <div class="hd">Today.</div>
        <div class="ln"><span class="bx"></span><span>Read for 30 min</span><span class="mt">14:00</span></div>
        <div class="ln"><span class="bx"></span><span class="acc">Plan Q3 goals</span><span class="mt">15:00</span></div>
      </div>
    </div>
    <div class="mode dark">
      <div class="stripe">
        <span>bg‑1</span><span>bg‑2</span><span>bg‑3</span><span>bg‑elev</span>
      </div>
      <div class="demo">
        <div class="hd">Today.</div>
        <div class="ln"><span class="bx"></span><span>Read for 30 min</span><span class="mt">14:00</span></div>
        <div class="ln"><span class="bx"></span><span class="acc">Plan Q3 goals</span><span class="mt">15:00</span></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Menu + popover</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  body { padding: 0; }
  .stage { position: relative; min-height: 320px; padding: 24px; background: var(--bg-2); }
  .menu {
    width: 160px;
    background: var(--bg-elev);
    border: 1px solid var(--border-1);
    border-radius: var(--radius-2);
    box-shadow: var(--shadow-2);
    padding: 4px;
    display: flex; flex-direction: column;
  }
  .menu .item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    border-radius: var(--radius-2);
    cursor: pointer;
    font-family: var(--font-serif); font-size: 14px;
    color: var(--fg-1);
  }
  .menu .item:hover { background: var(--bg-2); }
  .menu .item .kbd {
    margin-left: auto;
    font-family: var(--font-mono); font-size: 10px;
    color: var(--fg-3);
    letter-spacing: 0.04em;
  }
  .menu .item svg { width: 15px; height: 15px; stroke-width: 1.5; color: var(--fg-2); }
  .menu .item.danger { color: var(--danger); }
  .menu .item.danger svg { color: var(--danger); }
  .menu .sep { height: 1px; background: var(--border-1); margin: 4px -4px; }
  .menu .head {
    padding: 6px 10px 4px;
    font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-3);
  }
  .grid { display: grid; grid-template-columns: 160px 1fr; gap: 28px; align-items: start; }
  .quote { font-family: var(--font-serif); font-style: italic; font-size: 15px; color: var(--fg-2); max-width: 32ch; line-height: 1.45; }
</style>
</head>
<body>
<div class="stage">
  <div class="grid">
    <div class="menu">
      <div class="item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 113 3L7 19l-4 1 1-4z"/></svg>
        Edit
        <span class="kbd">⏎</span>
      </div>
      <div class="item danger">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        Delete
        <span class="kbd">⌫</span>
      </div>
    </div>
    <p class="quote">
      Two actions — Edit and Delete — surface on hover (pencil + trash on the row itself) or via right-click. Quiet by default, just one short shadow.
    </p>
  </div>
</div>
</body>
</html>

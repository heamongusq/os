<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Shadows & elevation</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 8px 0 16px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box {
    width: 160px; height: 80px; background: var(--bg-1);
    border: 1px solid var(--border-1);
    border-radius: var(--radius-2);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-serif); font-style: italic; font-size: 15px; color: var(--fg-2);
  }
  .one   { box-shadow: var(--shadow-1); }
  .two   { box-shadow: var(--shadow-2); }
  .three { box-shadow: var(--shadow-3); }
  .nm  { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
  .v   { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="item"><div class="box one">hover row</div><span class="nm">--shadow-1</span><span class="v">0 1px 0 · 4%</span></div>
    <div class="item"><div class="box two">menu / popover</div><span class="nm">--shadow-2</span><span class="v">0 8px 24px · 14%</span></div>
    <div class="item"><div class="box three">modal</div><span class="nm">--shadow-3</span><span class="v">0 24px 64px · 24%</span></div>
  </div>
</div>
</body>
</html>

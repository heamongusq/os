<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Task row</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  body { padding: 0; }
  .stack { display: flex; flex-direction: column; gap: 8px; padding: 16px 20px 20px; }

  .section-label {
    font-family: var(--font-mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--fg-3);
    padding: 6px 4px;
  }

  /* Card-style row — bordered, separated by gap, not hairline */
  .task-card {
    position: relative;
    display: grid;
    grid-template-columns: 4px 24px minmax(0, 1fr) auto auto;
    align-items: center;
    gap: 0 12px;
    padding: 12px 14px 12px 0;
    border: 1px solid var(--border-1);
    border-radius: var(--radius-2);
    background: var(--bg-1);
    transition: background var(--dur-2), border-color var(--dur-2);
  }
  .task-card:hover { background: var(--bg-2); }
  .task-card:hover .actions { opacity: 1; }
  .task-card:hover .meta { opacity: 0; }

  .task-card .bar {
    width: 3px; height: 22px;
    border-radius: 2px;
    background: transparent;
    align-self: center;
    margin-left: 4px;
  }
  .task-card.focused { background: var(--bg-2); border-color: var(--accent-ring); }
  .task-card.focused .bar { background: var(--accent); }

  .cb {
    width: 18px; height: 18px; margin-left: 4px;
    border: 1.5px solid var(--border-strong); border-radius: 3px;
    background: var(--bg-1);
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .cb svg { width: 12px; height: 12px; stroke-width: 2; color: #fff; opacity: 0; }
  .cb.checked { background: var(--accent); border-color: var(--accent); }
  .cb.checked svg { opacity: 1; }

  .title-line {
    font-family: var(--font-serif); font-size: 16px; color: var(--fg-1);
    line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .title-line .tag {
    color: var(--accent);
    font-style: italic;
    font-variation-settings: "opsz" 16;
    margin-left: 2px;
  }
  .title-line .goal {
    color: var(--accent);
    font-style: italic;
    font-variation-settings: "opsz" 16;
  }

  .struck { color: var(--fg-3); text-decoration: line-through; text-decoration-thickness: 1px; }

  /* Priority pill */
  .prio {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 8px 2px 6px;
    border-radius: var(--radius-pill);
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--fg-2);
    border: 1px solid var(--border-1);
    background: var(--bg-1);
    white-space: nowrap;
  }
  .prio .bars { display: inline-flex; gap: 2px; align-items: end; }
  .prio .bars i { display: inline-block; width: 2px; background: currentColor; border-radius: 1px; }
  .prio .bars i:nth-child(1) { height: 5px; }
  .prio .bars i:nth-child(2) { height: 7px; }
  .prio .bars i:nth-child(3) { height: 10px; }
  .prio--low .bars i:nth-child(2),
  .prio--low .bars i:nth-child(3) { opacity: 0.22; }
  .prio--med .bars i:nth-child(3) { opacity: 0.22; }
  .prio--high     { color: var(--warning); border-color: var(--warning-tint); background: var(--warning-tint); }
  .prio--highest  { color: var(--danger);  border-color: var(--danger-tint);  background: var(--danger-tint); }

  .meta {
    font-family: var(--font-mono); font-size: 11px; color: var(--fg-3);
    transition: opacity var(--dur-2);
    min-width: 36px; text-align: right;
  }

  .actions {
    position: absolute; right: 12px;
    display: flex; gap: 2px;
    opacity: 0; transition: opacity var(--dur-2);
    background: linear-gradient(to right, transparent 0, var(--bg-2) 16px);
    padding-left: 24px;
  }
  .actions button {
    width: 26px; height: 26px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--fg-3); border-radius: var(--radius-2);
    background: transparent;
  }
  .actions button:hover { background: var(--bg-3); color: var(--fg-1); }
  .actions button.danger:hover { color: var(--danger); }
  .actions svg { width: 14px; height: 14px; stroke-width: 1.5; }
</style>
</head>
<body>
<div class="stack">
  <div class="section-label">Morning</div>

  <div class="task-card">
    <span class="bar"></span>
    <span class="cb"></span>
    <span class="title-line">Edit Thesis for <span class="tag">1 hour</span></span>
    <span class="prio prio--med"><span class="bars"><i></i><i></i><i></i></span>Med</span>
    <span class="meta">08:00</span>
    <div class="actions">
      <button title="Edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 113 3L7 19l-4 1 1-4z"/></svg></button>
      <button title="Delete" class="danger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg></button>
    </div>
  </div>

  <div class="task-card focused">
    <span class="bar"></span>
    <span class="cb"></span>
    <span class="title-line">Work on chapter 4 for <span class="tag">90 min</span> · <span class="goal">→ Thesis</span></span>
    <span class="prio prio--high"><span class="bars"><i></i><i></i><i></i></span>High</span>
    <span class="meta">09:30</span>
    <div class="actions" style="background: linear-gradient(to right, transparent 0, var(--bg-2) 16px)">
      <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 113 3L7 19l-4 1 1-4z"/></svg></button>
      <button class="danger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg></button>
    </div>
  </div>

  <div class="task-card">
    <span class="bar"></span>
    <span class="cb checked"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
    <span class="title-line struck">Email professor — done in <span style="color: var(--fg-3); font-style: italic;">12 min</span></span>
    <span class="prio prio--low"><span class="bars"><i></i><i></i><i></i></span>Low</span>
    <span class="meta">done · 09:14</span>
  </div>

  <div class="task-card">
    <span class="bar"></span>
    <span class="cb"></span>
    <span class="title-line">Apartment viewing — Mitte for <span class="tag">2 hours</span></span>
    <span class="prio prio--highest"><span class="bars"><i></i><i></i><i></i></span>Highest</span>
    <span class="meta">13:00</span>
  </div>
</div>
</body>
</html>

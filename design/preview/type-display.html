<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Type — Display (serif)</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .specimen { display: grid; grid-template-columns: 1fr auto; gap: 24px 16px; align-items: baseline; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); white-space: nowrap; }
  .it { font-style: italic; }
</style>
</head>
<body>
<div class="card">
  <div class="specimen">
    <div class="t-display-xl">Operate <span class="it">your</span> day.</div>
    <div class="meta">Newsreader · 56 / 380 · opsz 72</div>

    <div class="t-display-l">Today is a system.</div>
    <div class="meta">Newsreader · 40 / 400 · opsz 56</div>

    <div class="t-display-m">Analytics</div>
    <div class="meta">Newsreader · 28 / 420 · opsz 36</div>

    <div class="t-display-s">Last 7 days</div>
    <div class="meta">Newsreader · 22 / 440 · opsz 24</div>
  </div>
</div>
</body>
</html>

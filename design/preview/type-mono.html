<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Type — Mono (data)</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .specimen { display: grid; grid-template-columns: 1fr auto; gap: 18px 16px; align-items: baseline; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); white-space: nowrap; }
  .data { display: flex; align-items: baseline; gap: 12px; }
  .data .unit { font-family: var(--font-mono); font-size: 13px; color: var(--fg-3); }
</style>
</head>
<body>
<div class="card">
  <div class="specimen">
    <div class="data">
      <span class="t-mono-data">142</span>
      <span class="unit">days · longest streak</span>
    </div>
    <div class="meta">JBMono · 40 / 300 · data</div>

    <div class="data">
      <span style="font-family:var(--font-mono); font-size:24px; font-weight:400">07:42</span>
      <span class="unit">avg wake time, last 30 days</span>
    </div>
    <div class="meta">JBMono · 24 / 400 · timestamp</div>

    <div class="t-mono">14:00 · Mon · Mar 14, 2026</div>
    <div class="meta">JBMono · 13 / 400 · row data</div>

    <div class="t-micro">PRIORITY · HIGHEST</div>
    <div class="meta">JBMono · 11 / 500 · 0.1em · all‑caps</div>
  </div>
</div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Type — Paragraph & italic</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .col2 { display: grid; grid-template-columns: 1.2fr 1fr; gap: 28px; align-items: start; }
  .col2 p { margin: 0; max-width: 38ch; }
  .quiet { color: var(--fg-2); font-style: italic; font-variation-settings: "opsz" 18; }
  .pull { font-family: var(--font-serif); font-style: italic; font-size: 26px; font-variation-settings: "opsz" 26; line-height: 1.25; color: var(--fg-1); }
  .by { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); margin-top: 8px; text-transform: uppercase; letter-spacing: 0.08em; }
</style>
</head>
<body>
<div class="card">
  <div class="col2">
    <p class="t-body">
      Define a goal — or don't. Tasks in OS work standalone. A goal is just
      a parent process; it doesn't run anything, it organizes what runs.
      <span class="quiet">Children's status does not affect the parent's.</span>
    </p>
    <div>
      <p class="pull">"Habits compound. Start with one — the smallest one."</p>
      <p class="by">— OS · empty habits state</p>
    </div>
  </div>
</div>
</body>
</html>
